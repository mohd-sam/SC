<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shift Calendar</title>
    
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --bg-off: #ecf0f1;
            --text-off: #2c3e50; 
            --bg-on: #2980b9;
            --text-on: #ffffff;  
            --bg-special: #ffffff;
            --text-special: #ff0000; 

            --primary: #2c3e50;
            --accent: #2980b9;
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --border-soft: #e0e0e0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --radius: 12px;
        }

        * { box-sizing: border-box; touch-action: manipulation; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: #333;
            margin: 0;
            padding: 10px;
            font-size: 14px;
            line-height: 1.4;
        }

        .main-container {
            display: grid;
            grid-template-columns: minmax(0, 2.2fr) minmax(0, 1.8fr) minmax(0, 1.2fr);
            gap: 15px;
            max-width: 1500px;
            margin: 0 auto;
            align-items: flex-start;
        }
        
        .top-bar {
            max-width: 1500px;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 10px 15px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .lang-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .section-card {
            background: var(--bg-card);
            padding: 15px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-soft);
            width: 100%;
            overflow: hidden; 
        }

        .table-responsive-wrapper {
            width: 100%;
            overflow-x: auto;
            border-radius: 8px;
        }

        #calTable { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 3px; 
            table-layout: fixed; 
        }

        .cal-header { color: #95a5a6; font-size: 10px; text-transform: uppercase; padding-bottom: 6px; font-weight: 700; text-align: center;}
        
        #calBody td {
            height: 44px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.02);
            font-weight: 600;
            vertical-align: middle;
            text-align: center;
            font-size: 10px;
            padding: 1px;
            position: relative;
        }

        /* High Contrast Month Start Indicators for Web View */
        .month-start {
            border-top: 5px solid #000 !important;
            font-weight: 900 !important;
        }
        .cell-on.month-start {
            border-top: 5px solid #fff !important;
        }
        .cell-special.month-start {
            border-top: 5px solid #000 !important;
        }

        .cell-off { background-color: var(--bg-off); color: var(--text-off); }
        .cell-on { background-color: var(--bg-on); color: var(--text-on); border-color: transparent !important; }
        .cell-special { 
            background-color: var(--bg-special) !important; 
            color: var(--text-special) !important; 
            font-weight: 800;
            border: 2px solid var(--text-special) !important;
        }

        .control-group { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f2f2f2; width: 100%; }
        .group-title { font-weight: 700; color: var(--primary); margin-bottom: 10px; display: block; font-size: 13px; }
        
        .palette-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        .palette-btn {
            background: #fff; border: 1px solid #ddd; border-radius: 8px;
            padding: 6px; cursor: pointer; display: flex; align-items: center;
            gap: 6px; font-size: 10px; font-weight: 600; transition: 0.2s;
        }
        .palette-preview { width: 16px; height: 16px; border-radius: 50%; display: flex; overflow: hidden; border: 1px solid #eee; }
        .p-on { width: 50%; height: 100%; }
        .p-off { width: 50%; height: 100%; }

        input[type="date"], input[type="number"] {
            width: 100%; padding: 8px; border: 1px solid #e0e0e0; border-radius: 8px;
            font-size: 14px; background: #fafafa; text-align: center;
        }

        /* Rotation List styling matching image look */
        #logicTable { border-spacing: 0; width: 100%; }
        #logicTable thead tr { border-bottom: 1px solid #e0e0e0; }
        #logicTable th { font-weight: 700; color: #2c3e50; padding: 12px 4px; font-size: 13px; text-align: center; }
        #logicTable td { padding: 14px 4px; text-align: center; font-size: 12px; color: #333; }
        
        #logicTable input[type="number"] { 
            width: 55px; 
            padding: 6px; 
            border-radius: 6px; 
            border: 1px solid #dcdde1; 
            text-align: center;
            font-family: inherit;
            font-weight: 600;
        }

        .export-btn {
            display: block; width: 100%; padding: 12px; margin-bottom: 12px;
            background-color: #e74c3c; color: white; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 700; cursor: pointer;
        }

        .sidebar-title { 
            font-size: 14px; 
            font-weight: 700; 
            border-bottom: 2px solid var(--accent); 
            padding-bottom: 8px; 
            margin-bottom: 12px; 
            text-align: center; 
            color: var(--primary);
            cursor: pointer;
            transition: color 0.2s;
        }
        .sidebar-title:hover { color: var(--accent); }

        .holiday-card { 
            background: white; border-radius: 10px; padding: 10px; margin-bottom: 8px; 
            border-left: 4px solid var(--accent); display: flex;
            justify-content: space-between; align-items: center; font-size: 12px;
        }
        .holiday-card.user-date { border-left-color: #ff0000; background: #fffcfc; }
        .holiday-date { color: var(--accent); font-weight: 700; font-size: 10px; }

        .toggle-spec-btn {
            background: var(--accent); color: white; border: none; border-radius: 50%;
            width: 24px; height: 24px; cursor: pointer; display: flex; align-items: center;
            justify-content: center; font-size: 16px; transition: 0.2s;
        }
        .toggle-spec-btn.remove-mode { background: #e67e22; }

        .year-view-container { max-width: 1500px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; }
        .year-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        .month-block { background: white; border-radius: 10px; border: 1px solid #eee; overflow: hidden; }
        .mini-table { width: 100%; border-collapse: separate; border-spacing: 1px; padding: 5px; }
        .mini-table td { font-size: 10px; text-align: center; padding: 3px 0; border-radius: 4px; font-weight: 600; }

        @media (max-width: 1024px) { 
            .main-container { grid-template-columns: 1fr 1fr; } 
            .sidebar-section { grid-column: span 2; }
        }
        @media (max-width: 768px) { 
            .main-container { grid-template-columns: 1fr; }
            .sidebar-section { grid-column: span 1; }
            .controls-section { order: -1; }
            #calBody td { font-size: 9px; height: 38px; }
        }

        [dir="rtl"] .holiday-card { border-left: 0; border-right: 4px solid var(--accent); }
        [dir="rtl"] .holiday-card.user-date { border-right-color: #ff0000; }
    </style>
</head>
<body dir="ltr">

    <div class="top-bar">
        <h2 style="margin:0; font-size: 1.1rem; font-weight: 800;" id="appTitle">Shift Calendar</h2>
        <button class="lang-btn" onclick="toggleLanguage()">عربي / English</button>
    </div>

    <div class="main-container">
        <!-- 1. CALENDAR VIEW -->
        <div class="section-card calendar-section">
            <div style="text-align:center; font-weight:800; font-size:14px; margin-bottom:15px; color:var(--primary); text-transform: uppercase;" id="lblCalView">Calendar View</div>
            <div class="table-responsive-wrapper">
                <table id="calTable">
                    <thead><tr id="calHeaderRow"></tr></thead>
                    <tbody id="calBody"></tbody>
                </table>
            </div>
        </div>

        <!-- 2. CONTROLS -->
        <div class="section-card controls-section">
            <button class="export-btn" onclick="generateShortPDF()" id="btnExport">Export PDF</button>
            
            <div class="control-group">
                <span class="group-title" id="lblPalettes">Color Palettes</span>
                <div class="palette-container">
                    <button class="palette-btn" onclick="applyPalette('#2980b9', '#ecf0f1')"><div class="palette-preview"><div class="p-on" style="background:#2980b9"></div><div class="p-off" style="background:#ecf0f1"></div></div><span>P1</span></button>
                    <button class="palette-btn" onclick="applyPalette('#2c3e50', '#1abc9c')"><div class="palette-preview"><div class="p-on" style="background:#2c3e50"></div><div class="p-off" style="background:#1abc9c"></div></div><span>P2</span></button>
                    <button class="palette-btn" onclick="applyPalette('#e67e22', '#34495e')"><div class="palette-preview"><div class="p-on" style="background:#e67e22"></div><div class="p-off" style="background:#34495e"></div></div><span>P3</span></button>
                    <button class="palette-btn" onclick="applyPalette('#f3e5ab', '#16a085')"><div class="palette-preview"><div class="p-on" style="background:#f3e5ab"></div><div class="p-off" style="background:#16a085"></div></div><span>P4</span></button>
                </div>
                
                <div class="color-settings" style="display:flex; justify-content: space-around; background:#f9f9f9; padding:8px; border-radius:10px;">
                    <div style="display:flex; flex-direction:column; align-items:center;"><input type="color" id="colOn" value="#2980b9" onchange="updateColors()">On</div>
                    <div style="display:flex; flex-direction:column; align-items:center;"><input type="color" id="colOff" value="#ecf0f1" onchange="updateColors()">Off</div>
                    <div style="display:flex; flex-direction:column; align-items:center;"><input type="color" id="colSpec" value="#ffffff" onchange="updateColors()">Spec</div>
                </div>
            </div>

            <div class="control-group">
                <span class="group-title" id="lblFirstWork">First Working Day</span>
                <input type="date" id="inStartDate" onchange="calculateAll()">
            </div>
            
            <div class="control-group">
                <span class="group-title">Special Highlight</span>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <input type="date" id="spec1" onchange="calculateAll()">
                    <input type="date" id="spec2" onchange="calculateAll()">
                    <input type="date" id="spec3" onchange="calculateAll()">
                    <input type="date" id="spec4" onchange="calculateAll()">
                </div>
            </div>
            
            <div class="control-group">
                <span class="group-title" id="lblRotationListTitle">Rotation List</span>
                <div class="table-responsive-wrapper">
                    <table id="logicTable">
                        <thead><tr><th>#</th><th>Start</th><th>On</th><th>Off</th><th>End</th></tr></thead>
                        <tbody id="logicBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 3. SIDEBAR (Holidays) -->
        <div class="section-card sidebar-section" id="section-holidays">
            <div class="sidebar-title" onclick="generateFullYearPDF()" id="lblHolidaysTitle">Islamic Holidays</div>
            <div id="islamicHolidaysList"></div>
        </div>
    </div>

    <div class="year-view-container">
        <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-size: 20px; font-weight: 800;">
            <button onclick="changeYear(-1)" style="border:none;background:none;cursor:pointer;">&lsaquo;</button>
            <span id="yearDisplayLabel">2025</span>
            <button onclick="changeYear(1)" style="border:none;background:none;cursor:pointer;">&rsaquo;</button>
        </div>
        <div class="year-grid" id="yearGrid"></div>
    </div>

<script>
    const i18n = {
        en: { appTitle: "Shift Calendar", lblCalView: "Calendar View", btnExport: "Export PDF", lblHolidaysTitle: "Islamic Holidays", lblRotationListTitle: "Rotation List", daysShort: ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"], h_ramadan: "Ramadan Start", h_fitr: "Eid al-Fitr", h_arafat: "Arafat Day", h_adha: "Eid al-Adha", h_hijri: "Islamic New Year", h_ashura: "Ashura", h_mawlid: "Prophet Birthday", userDate: "Special Highlight" },
        ar: { appTitle: "جدول الورديات", lblCalView: "عرض التقويم", btnExport: "تصدير PDF", lblHolidaysTitle: "المناسبات الإسلامية", lblRotationListTitle: "Rotation List", daysShort: ["أحد", "اثنين", "ثلاثاء", "أربعاء", "خميس", "جمعة", "سبت"], h_ramadan: "بداية رمضان", h_fitr: "عيد الفطر", h_arafat: "يوم عرفة", h_adha: "عيد الأضحى", h_hijri: "رأس السنة الهجرية", h_ashura: "عاشوراء", h_mawlid: "المولد النبوي", userDate: "تحديد خاص" }
    };

    const arFullMonths = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];

    const staticHolidayFallback = {
        2024: [{ id: 'h_ramadan', d: '2024-03-11' }, { id: 'h_fitr', d: '2024-04-10' }, { id: 'h_arafat', d: '2024-06-15' }, { id: 'h_adha', d: '2024-06-16' }, { id: 'h_hijri', d: '2024-07-07' }, { id: 'h_ashura', d: '2024-07-16' }, { id: 'h_mawlid', d: '2024-09-15' }],
        2025: [{ id: 'h_ramadan', d: '2025-03-01' }, { id: 'h_fitr', d: '2025-03-30' }, { id: 'h_arafat', d: '2025-06-06' }, { id: 'h_adha', d: '2025-06-07' }, { id: 'h_hijri', d: '2025-06-26' }, { id: 'h_ashura', d: '2025-07-05' }, { id: 'h_mawlid', d: '2025-09-04' }],
        2026: [{ id: 'h_ramadan', d: '2026-02-18' }, { id: 'h_fitr', d: '2026-03-20' }, { id: 'h_arafat', d: '2026-05-26' }, { id: 'h_adha', d: '2026-05-27' }, { id: 'h_hijri', d: '2026-06-16' }, { id: 'h_ashura', d: '2026-06-25' }, { id: 'h_mawlid', d: '2026-08-25' }]
    };

    const holidayNamesMap = { "1-1": "h_hijri", "10-1": "h_ashura", "12-3": "h_mawlid", "1-9": "h_ramadan", "1-10": "h_fitr", "9-12": "h_arafat", "10-12": "h_adha" };

    let currentLang = 'en';
    let rowsState = Array.from({length: 12}, () => ({ on: 14, off: 14 }));
    let currentViewYear = new Date().getFullYear();
    let globalOnDutySet = new Set(); 
    let cachedHolidays = {};

    function saveData() {
        const data = {
            startDate: document.getElementById('inStartDate').value,
            specials: [document.getElementById('spec1').value, document.getElementById('spec2').value, document.getElementById('spec3').value, document.getElementById('spec4').value],
            colors: { on: document.getElementById('colOn').value, off: document.getElementById('colOff').value, spec: document.getElementById('colSpec').value },
            rowsState: rowsState, lang: currentLang
        };
        localStorage.setItem('shiftCalendarData', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('shiftCalendarData');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('inStartDate').value = data.startDate || "";
            document.getElementById('spec1').value = data.specials[0] || "";
            document.getElementById('spec2').value = data.specials[1] || "";
            document.getElementById('spec3').value = data.specials[2] || "";
            document.getElementById('spec4').value = data.specials[3] || "";
            if (data.colors) {
                document.getElementById('colOn').value = data.colors.on;
                document.getElementById('colOff').value = data.colors.off;
                document.getElementById('colSpec').value = data.colors.spec || "#ffffff";
            }
            rowsState = data.rowsState || Array.from({length: 12}, () => ({ on: 14, off: 14 }));
            currentLang = data.lang || 'en';
        }
    }

    function init() {
        loadData();
        if (!document.getElementById('inStartDate').value) document.getElementById('inStartDate').value = new Date().toISOString().split('T')[0];
        document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        updateUIText();
        calculateAll();
        loadIslamicHolidays(new Date(document.getElementById('inStartDate').value).getFullYear());
        updateColors(); 
    }

    function updateUIText() {
        document.getElementById('appTitle').innerText = i18n[currentLang].appTitle;
        document.getElementById('btnExport').innerText = i18n[currentLang].btnExport;
        document.getElementById('lblHolidaysTitle').innerText = i18n[currentLang].lblHolidaysTitle;
        document.getElementById('lblCalView').innerText = i18n[currentLang].lblCalView;
        document.getElementById('lblRotationListTitle').innerText = i18n[currentLang].lblRotationListTitle;
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        updateUIText();
        calculateAll();
        renderHolidayList(cachedHolidays[currentViewYear] || staticHolidayFallback[currentViewYear] || []);
        saveData();
    }

    function applyPalette(on, off) {
        document.getElementById('colOn').value = on;
        document.getElementById('colOff').value = off;
        updateColors();
    }

    function getContrastColor(hex) {
        const r = parseInt(hex.substr(1, 2), 16), g = parseInt(hex.substr(3, 2), 16), b = parseInt(hex.substr(5, 2), 16);
        return (((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128) ? '#000000' : '#ffffff';
    }

    function updateColors() {
        const r = document.querySelector(':root'), cOn = document.getElementById('colOn').value, cOff = document.getElementById('colOff').value, cSpec = document.getElementById('colSpec').value;
        r.style.setProperty('--bg-on', cOn);
        r.style.setProperty('--text-on', getContrastColor(cOn));
        r.style.setProperty('--bg-off', cOff);
        r.style.setProperty('--text-off', getContrastColor(cOff));
        r.style.setProperty('--bg-special', cSpec);
        const isBgLight = getContrastColor(cSpec) === '#000000';
        r.style.setProperty('--text-special', isBgLight ? '#ff0000' : '#ffffff');
        r.style.setProperty('--accent', cOn);
        saveData();
    }

    function toISODate(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

    function calculateAll() {
        const dateVal = document.getElementById('inStartDate').value;
        if (!dateVal) return;
        const startDate = new Date(dateVal);
        globalOnDutySet.clear();
        let currentStart = new Date(startDate);
        let bodyHTML = "";
        
        for (let i = 0; i < rowsState.length; i++) {
            let tempDate = new Date(currentStart);
            for (let d = 0; d < rowsState[i].on; d++) {
                globalOnDutySet.add(toISODate(tempDate));
                tempDate.setDate(tempDate.getDate() + 1);
            }
            let cycleEnd = new Date(currentStart);
            cycleEnd.setDate(cycleEnd.getDate() + rowsState[i].on + rowsState[i].off - 1);
            
            const inputAttrs = `type="number" inputmode="numeric" pattern="[0-9]*" onfocus="this.select()"`;
            
            bodyHTML += `<tr>
                <td>${i+1}</td>
                <td>${currentStart.getMonth() + 1}/${currentStart.getDate()}/${currentStart.getFullYear()}</td>
                <td><input ${inputAttrs} value="${rowsState[i].on}" onchange="updateTable(${i}, 'on', this.value)"></td>
                <td><input ${inputAttrs} value="${rowsState[i].off}" onchange="updateTable(${i}, 'off', this.value)"></td>
                <td>${cycleEnd.getMonth() + 1}/${cycleEnd.getDate()}/${cycleEnd.getFullYear()}</td>
            </tr>`;
            currentStart = new Date(cycleEnd); currentStart.setDate(currentStart.getDate() + 1);
        }
        document.getElementById('logicBody').innerHTML = bodyHTML;
        buildCalendar(startDate);
        if (startDate.getFullYear() !== currentViewYear) {
            currentViewYear = startDate.getFullYear();
            loadIslamicHolidays(currentViewYear);
        }
        updateYearView();
        saveData();
    }

    function updateTable(idx, type, val) {
        let n = parseInt(val) || 0;
        for (let i = idx; i < rowsState.length; i++) { if (type === 'on') rowsState[i].on = n; else rowsState[i].off = n; }
        calculateAll();
    }

    function buildCalendar(firstDate) {
        let thead = "", daysList = i18n[currentLang].daysShort, startIdx = firstDate.getDay();
        for (let i = 0; i < 7; i++) thead += `<td class="cal-header">${daysList[(startIdx + i) % 7]}</td>`;
        document.getElementById('calHeaderRow').innerHTML = thead;
        let tbody = "", gridDate = new Date(firstDate), specials = [document.getElementById('spec1').value, document.getElementById('spec2').value, document.getElementById('spec3').value, document.getElementById('spec4').value];
        for (let r = 0; r < 35; r++) {
            tbody += "<tr>";
            for (let c = 0; c < 7; c++) {
                let iso = toISODate(gridDate), cls = specials.includes(iso) ? "cell-special" : (globalOnDutySet.has(iso) ? "cell-on" : "cell-off");
                if (gridDate.getDate() === 1) cls += " month-start";
                let monthLabel = (currentLang === 'ar') ? (gridDate.getMonth() + 1) : gridDate.toLocaleString('default',{month:'short'});
                tbody += `<td class="${cls}">${gridDate.getDate()}-${monthLabel}</td>`;
                gridDate.setDate(gridDate.getDate() + 1);
            }
            tbody += "</tr>";
        }
        document.getElementById('calBody').innerHTML = tbody;
        renderHolidayList(cachedHolidays[currentViewYear] || []);
    }

    function toggleSpecialDate(dateStr) {
        const slots = ['spec1', 'spec2', 'spec3', 'spec4'];
        let foundIdx = slots.findIndex(id => document.getElementById(id).value === dateStr);
        if (foundIdx !== -1) { document.getElementById(slots[foundIdx]).value = ""; }
        else {
            let emptyIdx = slots.findIndex(id => !document.getElementById(id).value);
            if (emptyIdx !== -1) document.getElementById(slots[emptyIdx]).value = dateStr;
            else document.getElementById('spec4').value = dateStr;
        }
        calculateAll();
    }

    function createMonthElement(year, month) {
        const monthDate = new Date(year, month, 1), specials = [document.getElementById('spec1').value, document.getElementById('spec2').value, document.getElementById('spec3').value, document.getElementById('spec4').value];
        const block = document.createElement('div'); block.className = "month-block";
        block.innerHTML = `<div class="month-title">${monthDate.toLocaleString(currentLang==='ar'?'ar-EG':'default',{month:'long', year:'numeric'})}</div>`;
        const table = document.createElement('table'); table.className = "mini-table";
        let trH = "<tr>"; const miniD = currentLang === 'ar' ? ["ح","ن","ث","ر","خ","ج","س"] : ["S","M","T","W","T","F","S"];
        miniD.forEach(d => trH += `<th>${d}</th>`); table.innerHTML = trH + "</tr>";
        let daysInM = new Date(year, month + 1, 0).getDate(), tr = document.createElement('tr');
        for (let i = 0; i < monthDate.getDay(); i++) tr.appendChild(document.createElement('td'));
        for (let d = 1; d <= daysInM; d++) {
            if (tr.children.length === 7) { table.appendChild(tr); tr = document.createElement('tr'); }
            const cellDate = new Date(year, month, d), iso = toISODate(cellDate), td = document.createElement('td');
            td.innerText = d; 
            let cls = specials.includes(iso) ? "cell-special" : (globalOnDutySet.has(iso) ? "cell-on" : "cell-off");
            if (d === 1) cls += " month-start";
            td.className = cls; tr.appendChild(td);
        }
        while (tr.children.length > 0 && tr.children.length < 7) tr.appendChild(document.createElement('td'));
        if (tr.children.length > 0) table.appendChild(tr); block.appendChild(table); return block;
    }

    function updateYearView() {
        const container = document.getElementById('yearGrid'); container.innerHTML = "";
        document.getElementById('yearDisplayLabel').innerText = currentViewYear;
        for (let m = 0; m < 12; m++) container.appendChild(createMonthElement(currentViewYear, m));
    }

    function changeYear(delta) { currentViewYear += delta; updateYearView(); loadIslamicHolidays(currentViewYear); }
    
    async function loadIslamicHolidays(year) {
        const list = document.getElementById('islamicHolidaysList');
        list.innerHTML = `<div style="text-align:center; padding:10px; color:#999; font-size:12px;">Loading...</div>`;
        if (cachedHolidays[year]) { renderHolidayList(cachedHolidays[year]); return; }
        try {
            const response = await fetch(`https://api.aladhan.com/v1/gregorianCalendarByYear/${year}`);
            if (response.ok) {
                const json = await response.json();
                const holidays = [];
                const seenKeys = new Set();
                for (let m = 1; m <= 12; m++) {
                    const monthData = json.data[m];
                    if (!monthData) continue;
                    monthData.forEach(day => {
                        const hijri = day.hijri;
                        const key = `${hijri.day}-${hijri.month.number}`;
                        if (holidayNamesMap[key] && !seenKeys.has(key)) {
                            holidays.push({ id: holidayNamesMap[key], d: day.gregorian.date.split('-').reverse().join('-') });
                            seenKeys.add(key);
                        }
                    });
                }
                holidays.sort((a, b) => new Date(a.d) - new Date(b.d));
                cachedHolidays[year] = holidays;
                renderHolidayList(holidays);
            } else { throw new Error(); }
        } catch (e) {
            const fallback = staticHolidayFallback[year];
            if (fallback) { cachedHolidays[year] = fallback; renderHolidayList(fallback); }
            else list.innerHTML = `<div style="text-align:center; padding:10px; color:#e74c3c; font-size:12px;">API Error</div>`;
        }
    }

    function renderHolidayList(hArr) {
        const list = document.getElementById('islamicHolidaysList');
        const specialInputs = [document.getElementById('spec1').value, document.getElementById('spec2').value, document.getElementById('spec3').value, document.getElementById('spec4').value];
        let combined = [...hArr.map(h => ({...h, type: 'religious'}))];
        specialInputs.forEach(sd => { if (sd && new Date(sd).getFullYear() === currentViewYear && !combined.some(h => h.d === sd)) combined.push({ id: 'user_date', d: sd, type: 'user' }); });
        combined.sort((a, b) => new Date(a.d) - new Date(b.d));
        let html = "";
        combined.forEach(h => {
            const hDate = new Date(h.d), isAssigned = specialInputs.includes(h.d), cls = (h.type === 'user' || isAssigned) ? 'holiday-card user-date' : 'holiday-card';
            let btn = `<button class="toggle-spec-btn ${isAssigned ? 'remove-mode' : ''}" onclick="toggleSpecialDate('${h.d}')">${isAssigned ? '−' : '+'}</button>`;
            html += `<div class="${cls}"><div><div style="font-weight:700;">${i18n[currentLang][h.id] || i18n[currentLang].userDate}</div><div class="holiday-date">${hDate.toLocaleDateString(currentLang==='ar'?'ar-EG':'en-US', {day:'numeric', month:'short'})}</div></div>${btn}</div>`;
        });
        list.innerHTML = html;
    }

    // Helper for creating PDF Table Rows
    function createPDFTable(rowsCount) {
        const cOn = document.getElementById('colOn').value, cOff = document.getElementById('colOff').value, cSpec = document.getElementById('colSpec').value;
        const tOn = getContrastColor(cOn), tOff = getContrastColor(cOff);
        const specials = [document.getElementById('spec1').value, document.getElementById('spec2').value, document.getElementById('spec3').value, document.getElementById('spec4').value];
        const startDay = new Date(document.getElementById('inStartDate').value);
        let curr = new Date(startDay);

        const table = document.createElement('table'); table.style.width = '100%'; table.style.borderCollapse = 'collapse'; table.style.tableLayout = 'fixed';
        
        // Header
        const thead = document.createElement('tr');
        const days = i18n[currentLang].daysShort;
        const startIdx = startDay.getDay();
        for(let i=0; i<7; i++) {
            const th = document.createElement('th'); th.innerText = days[(startIdx+i)%7]; 
            th.style.border = '1px solid #ccc'; th.style.padding = '4px'; th.style.fontSize = '10px'; thead.appendChild(th);
        }
        table.appendChild(thead);

        for (let r = 0; r < rowsCount; r++) { 
            const tr = document.createElement('tr');
            for (let c = 0; c < 7; c++) {
                const td = document.createElement('td'); const iso = toISODate(curr);
                let monthLabel = (currentLang === 'ar') ? arFullMonths[curr.getMonth()] : curr.toLocaleString('default',{month:'short'});
                td.innerText = (currentLang === 'ar') ? "\u200E" + curr.getDate() + "\u00A0" + monthLabel : curr.getDate() + "-" + monthLabel;
                
                td.style.height = '34px'; td.style.textAlign = 'center'; td.style.border = '1px solid #ddd'; td.style.fontSize = '10px';
                
                // FIXED: Month-start indicator visibility logic for PDF
                if (curr.getDate() === 1) {
                    td.style.borderTop = '4px solid #000';
                }

                if (specials.includes(iso)) { 
                    td.style.backgroundColor = cSpec; 
                    td.style.color = getContrastColor(cSpec) === '#000000' ? 'red' : 'white'; 
                    td.style.fontWeight='bold'; td.style.border='1.5px solid red';
                }
                else if (globalOnDutySet.has(iso)) { 
                    td.style.backgroundColor = cOn; td.style.color = tOn; 
                    if (curr.getDate() === 1) td.style.borderTop = '4px solid #fff'; // White border on dark cell
                }
                else { 
                    td.style.backgroundColor = cOff; td.style.color = tOff; 
                }
                tr.appendChild(td); curr.setDate(curr.getDate() + 1);
            }
            table.appendChild(tr);
        }
        return table;
    }

    function generateShortPDF() {
        const temp = document.createElement('div');
        temp.style.width = '680px'; temp.style.padding = '25px'; temp.style.background = 'white';
        const title = document.createElement('h1'); title.style.textAlign = 'center'; title.style.marginBottom = '15px'; title.innerText = "Shift Summary " + currentViewYear;
        temp.appendChild(title);
        temp.appendChild(createPDFTable(18));
        const opt = { margin: 0.1, filename: 'Shift_Summary.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(temp).save();
    }

    function generateFullYearPDF() {
        const temp = document.createElement('div');
        temp.style.width = '680px'; temp.style.padding = '25px'; temp.style.background = 'white';
        const title = document.createElement('h1'); title.style.textAlign = 'center'; title.style.marginBottom = '15px'; title.innerText = "Full Year Calendar " + currentViewYear;
        temp.appendChild(title);
        temp.appendChild(createPDFTable(52)); // Enough rows for 1 year
        const opt = { margin: 0.1, filename: 'Full_Year_Calendar.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(temp).save();
    }

    window.onload = init;
</script>
