<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shift Calendar</title>
    
    <!-- PDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --bg-off: #38761d;
            --text-off: #ffffff; 
            --bg-on: #ffeb3b;
            --text-on: #000000;  
            --bg-special: #ffffff;
            --text-special: #ff0000; 

            --primary: #2c3e50;
            --accent: #217346;
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --border-soft: #e0e0e0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --radius: 12px;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: #333;
            margin: 0;
            padding: 10px;
            font-size: 14px;
        }

        .main-container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            align-items: flex-start;
        }
        
        .top-bar {
            max-width: 1400px;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 12px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .lang-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .section-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border-soft);
        }

        .calendar-section { flex: 2; min-width: 340px; }
        .controls-section { flex: 2; min-width: 320px; }
        .sidebar-section { flex: 1; min-width: 250px; display: flex; flex-direction: column; }

        #calTable { width: 100%; border-collapse: separate; border-spacing: 6px; margin-top: 10px; }
        .cal-header { color: #95a5a6; font-size: 11px; text-transform: uppercase; padding-bottom: 8px; font-weight: 700; }
        
        #calBody td {
            height: 48px;
            border-radius: 10px;
            border: 1px solid rgba(0,0,0,0.03);
            font-weight: 600;
            vertical-align: middle;
            text-align: center;
            transition: all 0.2s ease;
            white-space: nowrap; 
            font-size: 13px;
            padding: 2px;
        }

        .cell-off { background-color: var(--bg-off); color: var(--text-off); border:none !important;}
        .cell-on { background-color: var(--bg-on); color: var(--text-on); border:none !important;}
        .cell-special { 
            background-color: var(--bg-special) !important; 
            color: var(--text-special) !important; 
            font-weight: 800;
            border: 2px solid var(--text-special) !important;
        }

        .control-group { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f0f0f0; }
        .group-title { font-weight: 700; color: var(--primary); margin-bottom: 12px; display: block; font-size: 14px; }
        
        .instructions-box {
            background: #ebf5ee; padding: 15px; border-radius: 10px; 
            color: #1e5631; font-size: 13px; margin-bottom: 15px; line-height: 1.6;
            border-left: 4px solid var(--accent);
        }

        input[type="date"], input[type="number"] {
            width: 100%; padding: 10px; border: 1px solid #e0e0e0; border-radius: 8px;
            font-size: 14px; background: #fafafa; text-align: center;
        }

        .export-btn {
            display: block; width: 100%; padding: 15px; margin-bottom: 15px;
            background-color: #e74c3c; color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2);
        }

        .sidebar-title { font-size: 15px; font-weight: 700; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 15px; text-align: center; cursor: pointer; }
        .holiday-card { background: white; border-radius: 10px; padding: 12px; margin-bottom: 10px; border: 1px solid #f0f0f0; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        
        .year-view-container { max-width: 1400px; margin: 20px auto; padding: 25px; background: var(--bg-card); border-radius: var(--radius); box-shadow: var(--shadow); }
        .year-header-controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; font-size: 22px; font-weight: 800; }
        .year-header-controls button { background: #f0f0f0; border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; }
        .year-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .month-block { width: 280px; background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .month-title { text-align: center; font-weight: 700; background: #fafafa; padding: 10px; border-bottom: 1px solid #eee; }
        .mini-table { width: 100%; border-collapse: separate; border-spacing: 2px; padding: 8px; }
        .mini-table th { color: #bdc3c7; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .mini-table td { text-align: center; font-size: 11px; padding: 4px 0; border-radius: 5px; font-weight: 600; }

        @media (max-width: 768px) { 
            .main-container { flex-direction: column; } 
            #calBody td { height: 44px; } 
            /* Order elements for mobile based on user request */
            .controls-section { order: -1; } /* Setup controls first */
            .calendar-section { order: 0; }
            .sidebar-section { order: 1; }
        }
    </style>
</head>
<body dir="ltr">

    <div class="top-bar">
        <h2 style="margin:0; font-weight: 800;" id="appTitle">Shift Calendar</h2>
        <button class="lang-btn" onclick="toggleLanguage()">عربي / English</button>
    </div>

    <div class="main-container">
        <!-- 1. CALENDAR VIEW -->
        <div class="section-card calendar-section" id="section-calendar">
            <div style="text-align:center; font-weight:800; font-size:16px; margin-bottom:20px; color:var(--primary); text-transform: uppercase;" id="lblCalView">Calendar View</div>
            <table id="calTable">
                <thead><tr id="calHeaderRow"></tr></thead>
                <tbody id="calBody"></tbody>
            </table>
        </div>

        <!-- 2. CONTROLS -->
        <div class="section-card controls-section">
            <button class="export-btn" onclick="generateShortPDF()" id="btnExport">Export to PDF</button>
            
            <div class="control-group">
                <div class="color-settings" style="display:flex; justify-content: space-around; background:#f9f9f9; padding:10px; border-radius:10px;">
                    <div style="display:flex; flex-direction:column; align-items:center;"><input type="color" id="colOn" value="#ffeb3b" onchange="updateColors()">On</div>
                    <div style="display:flex; flex-direction:column; align-items:center;"><input type="color" id="colOff" value="#38761d" onchange="updateColors()">Off</div>
                    <div style="display:flex; flex-direction:column; align-items:center;"><input type="color" id="colSpec" value="#ffffff" onchange="updateColors()">Spec</div>
                    <button onclick="resetColors()" style="border:1px solid #ddd; border-radius:20px; padding:5px 10px; cursor:pointer; font-size:11px;">Reset</button>
                </div>
            </div>

            <!-- Instructions Box -->
            <div class="instructions-box">
                <strong id="lblInstrTitle">Setup Guide:</strong><br>
                <span id="lblInstr1">1. Pick your first work day.</span><br>
                <span id="lblInstr2">2. Add holidays or special dates.</span><br>
                <span id="lblInstr3">3. Customize your shift cycle below.</span>
            </div>

            <div class="control-group">
                <span class="group-title" id="lblFirstWork">First Working Day</span>
                <input type="date" id="inStartDate" onchange="calculateAll()">
            </div>
            
            <div class="control-group">
                <span class="group-title">Special Highlighting</span>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="date" id="spec1" onchange="calculateAll()">
                    <input type="date" id="spec2" onchange="calculateAll()">
                    <input type="date" id="spec3" onchange="calculateAll()">
                    <input type="date" id="spec4" onchange="calculateAll()">
                </div>
            </div>
            
            <div class="control-group">
                <span class="group-title">Rotation List</span>
                <table id="logicTable">
                    <thead><tr><th>#</th><th>Start</th><th>On</th><th>Off</th><th>End</th></tr></thead>
                    <tbody id="logicBody"></tbody>
                </table>
            </div>
        </div>

        <!-- 3. SIDEBAR -->
        <div class="section-card sidebar-section" id="section-holidays">
            <div class="sidebar-title" onclick="generateFullPDF()" id="lblHolidaysTitle">Islamic Holidays</div>
            <div id="islamicHolidaysList"></div>
            <div class="visit-counter" style="margin-top:20px; border-top:1px solid #eee; padding-top:10px; text-align:center;">
                Visits: <span class="counter-val" id="visitCountVal">0</span>
            </div>
        </div>
    </div>

    <!-- 4. YEAR OVERVIEW -->
    <div class="year-view-container" id="section-yearview">
        <div class="year-header-controls">
            <button onclick="changeYear(-1)">&lsaquo;</button>
            <span id="yearDisplayLabel">2025 Overview</span>
            <button onclick="changeYear(1)">&rsaquo;</button>
        </div>
        <div class="year-grid" id="yearGrid"></div>
    </div>

<script>
    const i18n = {
        en: { 
            appTitle: "Shift Calendar", 
            lblCalView: "Calendar View", 
            btnExport: "Export to PDF", 
            lblHolidaysTitle: "Islamic Holidays", 
            daysShort: ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"],
            lblInstrTitle: "Setup Guide:",
            lblInstr1: "1. Pick your first work day.",
            lblInstr2: "2. Add holidays or special dates.",
            lblInstr3: "3. Customize your shift cycle below."
        },
        ar: { 
            appTitle: "جدول الورديات", 
            lblCalView: "عرض التقويم", 
            btnExport: "تصدير PDF", 
            lblHolidaysTitle: "المناسبات الإسلامية", 
            daysShort: ["أحد", "اثنين", "ثلاثاء", "أربعاء", "خميس", "جمعة", "سبت"],
            lblInstrTitle: "دليل الإعداد:",
            lblInstr1: "1. اختر تاريخ أول يوم عمل.",
            lblInstr2: "2. أضف المناسبات الخاصة.",
            lblInstr3: "3. عدّل نظام المناوبات أدناه."
        }
    };

    let currentLang = 'en';
    let rowsState = Array.from({length: 20}, () => ({ on: 14, off: 14 }));
    let currentViewYear = new Date().getFullYear();
    let globalOnDutySet = new Set(); 

    function saveData() {
        const data = {
            startDate: document.getElementById('inStartDate').value,
            specials: [
                document.getElementById('spec1').value,
                document.getElementById('spec2').value,
                document.getElementById('spec3').value,
                document.getElementById('spec4').value
            ],
            colors: {
                on: document.getElementById('colOn').value,
                off: document.getElementById('colOff').value,
                spec: document.getElementById('colSpec').value
            },
            rowsState: rowsState,
            lang: currentLang
        };
        localStorage.setItem('shiftCalendarData', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('shiftCalendarData');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('inStartDate').value = data.startDate || "";
            document.getElementById('spec1').value = data.specials[0] || "";
            document.getElementById('spec2').value = data.specials[1] || "";
            document.getElementById('spec3').value = data.specials[2] || "";
            document.getElementById('spec4').value = data.specials[3] || "";
            document.getElementById('colOn').value = data.colors.on || "#ffeb3b";
            document.getElementById('colOff').value = data.colors.off || "#38761d";
            document.getElementById('colSpec').value = data.colors.spec || "#ffffff";
            rowsState = data.rowsState || Array.from({length: 20}, () => ({ on: 14, off: 14 }));
            currentLang = data.lang || 'en';
        }
    }

    function init() {
        loadData();
        if (!document.getElementById('inStartDate').value) {
            document.getElementById('inStartDate').value = new Date().toISOString().split('T')[0];
        }
        
        document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        updateUIText();

        calculateAll();
        fetchIslamicHolidays(currentViewYear);
        updateColors(); 
        
        const visits = parseInt(localStorage.getItem('shiftCalendarVisits') || 0) + 1;
        document.getElementById('visitCountVal').innerText = visits;
        localStorage.setItem('shiftCalendarVisits', visits);
    }

    function updateUIText() {
        document.getElementById('appTitle').innerText = i18n[currentLang].appTitle;
        document.getElementById('btnExport').innerText = i18n[currentLang].btnExport;
        document.getElementById('lblHolidaysTitle').innerText = i18n[currentLang].lblHolidaysTitle;
        document.getElementById('lblCalView').innerText = i18n[currentLang].lblCalView;
        
        // Update Instructions
        document.getElementById('lblInstrTitle').innerText = i18n[currentLang].lblInstrTitle;
        document.getElementById('lblInstr1').innerText = i18n[currentLang].lblInstr1;
        document.getElementById('lblInstr2').innerText = i18n[currentLang].lblInstr2;
        document.getElementById('lblInstr3').innerText = i18n[currentLang].lblInstr3;
    }

    function toggleLanguage() {
        currentLang = currentLang === 'en' ? 'ar' : 'en';
        document.body.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        updateUIText();
        calculateAll();
        saveData();
    }

    function getContrastColor(hex) {
        const r = parseInt(hex.substr(1, 2), 16), g = parseInt(hex.substr(3, 2), 16), b = parseInt(hex.substr(5, 2), 16);
        return (((r * 299) + (g * 587) + (b * 114)) / 1000 >= 128) ? '#000000' : '#ffffff';
    }

    function updateColors() {
        const r = document.querySelector(':root'), cOn = document.getElementById('colOn').value, cOff = document.getElementById('colOff').value, cSpec = document.getElementById('colSpec').value;
        r.style.setProperty('--bg-on', cOn); r.style.setProperty('--text-on', getContrastColor(cOn));
        r.style.setProperty('--bg-off', cOff); r.style.setProperty('--text-off', getContrastColor(cOff));
        r.style.setProperty('--bg-special', cSpec); r.style.setProperty('--text-special', getContrastColor(cSpec) === '#000000' ? '#ff0000' : '#ffffff');
        saveData();
    }

    function resetColors() { 
        document.getElementById('colOn').value = "#ffeb3b"; 
        document.getElementById('colOff').value = "#38761d"; 
        document.getElementById('colSpec').value = "#ffffff"; 
        updateColors(); 
    }

    function toISODate(d) { 
        if (isNaN(d.getTime())) return "Invalid";
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function calculateAll() {
        const dateVal = document.getElementById('inStartDate').value;
        if (!dateVal) return;
        const parts = dateVal.split('-'), startDate = new Date(parts[0], parts[1]-1, parts[2]);
        globalOnDutySet.clear();
        let currentStart = new Date(startDate);
        let bodyHTML = "";
        
        for (let i = 0; i < rowsState.length; i++) {
            let tempDate = new Date(currentStart);
            for (let d = 0; d < rowsState[i].on; d++) {
                globalOnDutySet.add(toISODate(tempDate));
                tempDate.setDate(tempDate.getDate() + 1);
            }
            let cycleEnd = new Date(currentStart);
            cycleEnd.setDate(cycleEnd.getDate() + rowsState[i].on + rowsState[i].off - 1);
            
            bodyHTML += `<tr>
                <td>${i+1}</td>
                <td style="font-size:11px;">${currentStart.toLocaleDateString()}</td>
                <td><input type="number" value="${rowsState[i].on}" onfocus="this.select()" onchange="updateTable(${i}, 'on', this.value)"></td>
                <td><input type="number" value="${rowsState[i].off}" onfocus="this.select()" onchange="updateTable(${i}, 'off', this.value)"></td>
                <td style="font-size:11px;">${cycleEnd.toLocaleDateString()}</td>
            </tr>`;
            currentStart = new Date(cycleEnd); currentStart.setDate(currentStart.getDate() + 1);
        }
        document.getElementById('logicBody').innerHTML = bodyHTML;
        buildCalendar(startDate);
        updateYearView();
        saveData();
    }

    function updateTable(idx, type, val) {
        let n = parseInt(val) || 0;
        for (let i = idx; i < rowsState.length; i++) {
            if (type === 'on') rowsState[i].on = n; else rowsState[i].off = n;
        }
        calculateAll();
    }

    function buildCalendar(firstDate) {
        let thead = "", daysList = i18n[currentLang].daysShort, startIdx = firstDate.getDay();
        for (let i = 0; i < 7; i++) thead += `<td class="cal-header">${daysList[(startIdx + i) % 7]}</td>`;
        document.getElementById('calHeaderRow').innerHTML = thead;
        
        let tbody = "", gridDate = new Date(firstDate);
        const specials = [
            document.getElementById('spec1').value, 
            document.getElementById('spec2').value, 
            document.getElementById('spec3').value, 
            document.getElementById('spec4').value
        ];
        
        for (let r = 0; r < 60; r++) {
            tbody += "<tr>";
            for (let c = 0; c < 7; c++) {
                let iso = toISODate(gridDate);
                let cls = specials.includes(iso) ? "cell-special" : (globalOnDutySet.has(iso) ? "cell-on" : "cell-off");
                tbody += `<td class="${cls}">${gridDate.getDate()}-${gridDate.toLocaleString(currentLang==='ar'?'ar-EG':'default',{month:'short'})}</td>`;
                gridDate.setDate(gridDate.getDate() + 1);
            }
            tbody += "</tr>";
        }
        document.getElementById('calBody').innerHTML = tbody;
    }

    function createMonthElement(year, month) {
        const monthDate = new Date(year, month, 1);
        const specials = [
            document.getElementById('spec1').value, 
            document.getElementById('spec2').value, 
            document.getElementById('spec3').value, 
            document.getElementById('spec4').value
        ];
        
        const block = document.createElement('div');
        block.className = "month-block";
        block.innerHTML = `<div class="month-title">${monthDate.toLocaleString(currentLang==='ar'?'ar-EG':'default',{month:'long', year:'numeric'})}</div>`;
        
        const table = document.createElement('table');
        table.className = "mini-table";
        let trH = "<tr>";
        const miniD = currentLang === 'ar' ? ["ح","ن","ث","ر","خ","ج","س"] : ["S","M","T","W","T","F","S"];
        miniD.forEach(d => trH += `<th>${d}</th>`);
        table.innerHTML = trH + "</tr>";
        
        let daysInM = new Date(year, month + 1, 0).getDate();
        let tr = document.createElement('tr');
        for (let i = 0; i < monthDate.getDay(); i++) tr.appendChild(document.createElement('td'));
        
        for (let d = 1; d <= daysInM; d++) {
            if (tr.children.length === 7) { table.appendChild(tr); tr = document.createElement('tr'); }
            const cellDate = new Date(year, month, d);
            const iso = toISODate(cellDate);
            const td = document.createElement('td');
            td.innerText = d;
            td.className = specials.includes(iso) ? "cell-special" : (globalOnDutySet.has(iso) ? "cell-on" : "cell-off");
            tr.appendChild(td);
        }
        while (tr.children.length > 0 && tr.children.length < 7) tr.appendChild(document.createElement('td'));
        if (tr.children.length > 0) table.appendChild(tr);
        block.appendChild(table);
        return block;
    }

    function updateYearView() {
        const container = document.getElementById('yearGrid');
        container.innerHTML = "";
        document.getElementById('yearDisplayLabel').innerText = currentViewYear + " Overview";
        for (let m = 0; m < 12; m++) container.appendChild(createMonthElement(currentViewYear, m));
    }

    function changeYear(delta) { currentViewYear += delta; updateYearView(); }
    
    async function fetchIslamicHolidays(y) {
        const list = document.getElementById('islamicHolidaysList');
        list.innerHTML = `<div style="text-align:center; padding:10px; color:#999; font-size:12px;">Islamic holidays for ${y}</div>`;
    }

    function generateShortPDF() { createPDF(true); }
    function generateFullPDF() { createPDF(false); }

    function createPDF(isShort) {
        const temp = document.createElement('div');
        temp.style.width = '1000px'; 
        temp.style.background = 'white'; 
        temp.style.padding = '40px';
        temp.style.fontFamily = 'Segoe UI, Arial, sans-serif';

        const cOn = document.getElementById('colOn').value;
        const cOff = document.getElementById('colOff').value;
        const cSpec = document.getElementById('colSpec').value;
        const tOn = getContrastColor(cOn);
        const tOff = getContrastColor(cOff);
        const tSpec = getContrastColor(cSpec) === '#000000' ? '#ff0000' : '#ffffff';

        const title = document.createElement('h1');
        title.style.textAlign = 'center';
        title.style.color = '#2c3e50';
        title.style.marginBottom = '20px';
        title.style.fontSize = '26px';
        title.innerText = isShort ? "Shift Summary" : currentViewYear + " Full Year Calendar";
        temp.appendChild(title);

        const createPdfTable = (maxRows) => {
            const table = document.createElement('table');
            table.style.width = '100%';
            table.style.tableLayout = 'fixed';
            table.style.borderCollapse = 'collapse';
            table.style.marginBottom = '30px';

            const thead = document.createElement('thead');
            const hRow = document.createElement('tr');
            const daysList = i18n[currentLang].daysShort;
            const startDayInput = new Date(document.getElementById('inStartDate').value);
            const startIdx = startDayInput.getDay();

            for (let i = 0; i < 7; i++) {
                const th = document.createElement('th');
                th.innerText = daysList[(startIdx + i) % 7];
                th.style.width = '14.285%';
                th.style.color = '#7f8c8d';
                th.style.fontSize = '14px';
                th.style.padding = '12px 0';
                th.style.borderBottom = '2px solid #eee';
                th.style.textAlign = 'center';
                hRow.appendChild(th);
            }
            thead.appendChild(hRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            let currentPdfDate = new Date(startDayInput);
            const specials = [
                document.getElementById('spec1').value, 
                document.getElementById('spec2').value, 
                document.getElementById('spec3').value, 
                document.getElementById('spec4').value
            ];

            for (let r = 0; r < maxRows; r++) {
                const tr = document.createElement('tr');
                tr.style.pageBreakInside = 'avoid';

                for (let c = 0; c < 7; c++) {
                    const td = document.createElement('td');
                    const iso = toISODate(currentPdfDate);
                    const isSpec = specials.includes(iso);
                    const isOn = globalOnDutySet.has(iso);

                    td.innerText = currentPdfDate.getDate() + '-' + currentPdfDate.toLocaleString(currentLang==='ar'?'ar-EG':'default',{month:'short'});
                    td.style.height = '48px';
                    td.style.textAlign = 'center';
                    td.style.fontSize = '14px';
                    td.style.fontWeight = 'bold';
                    td.style.border = '2px solid white';
                    td.style.borderRadius = '8px';

                    if (isSpec) {
                        td.style.backgroundColor = cSpec;
                        td.style.color = tSpec;
                        td.style.border = '2px solid red';
                    } else if (isOn) {
                        td.style.backgroundColor = cOn;
                        td.style.color = tOn;
                    } else {
                        td.style.backgroundColor = cOff;
                        td.style.color = tOff;
                    }

                    tr.appendChild(td);
                    currentPdfDate.setDate(currentPdfDate.getDate() + 1);
                }
                tbody.appendChild(tr);
            }
            table.appendChild(tbody);
            return table;
        };

        temp.appendChild(createPdfTable(isShort ? 12 : 60));

        const subTitle = document.createElement('h2');
        subTitle.style.textAlign = 'center';
        subTitle.style.marginTop = '40px';
        subTitle.style.fontSize = '20px';
        subTitle.innerText = isShort ? "Upcoming 3-Month Overview" : "Rolling Monthly Overview";
        temp.appendChild(subTitle);

        const overviewTable = document.createElement('table');
        overviewTable.style.width = '100%';
        overviewTable.style.borderCollapse = 'collapse';
        overviewTable.style.marginTop = '20px';

        const mLimit = isShort ? 3 : 12;
        const val = document.getElementById('inStartDate').value;
        const sDateInput = new Date(val);
        const startY = sDateInput.getFullYear();
        const startM = sDateInput.getMonth();

        for (let row = 0; row < Math.ceil(mLimit / 3); row++) {
            const tr = document.createElement('tr');
            tr.style.pageBreakInside = 'avoid';
            for (let col = 0; col < 3; col++) {
                const td = document.createElement('td');
                td.style.width = '33.33%';
                td.style.padding = '10px';
                td.style.verticalAlign = 'top';

                const mIdx = row * 3 + col;
                if (mIdx < mLimit) {
                    const mOffset = isShort ? (startM + mIdx) : mIdx;
                    const targetYear = isShort ? startY : currentViewYear;
                    const sourceMonth = createMonthElement(targetYear, mOffset);
                    
                    const mWrapper = document.createElement('div');
                    mWrapper.style.border = '1px solid #ddd';
                    mWrapper.style.borderRadius = '10px';
                    mWrapper.style.overflow = 'hidden';

                    const mTitle = document.createElement('div');
                    mTitle.innerText = sourceMonth.querySelector('.month-title').innerText;
                    mTitle.style.background = '#f8f9fa';
                    mTitle.style.padding = '8px';
                    mTitle.style.fontSize = '14px';
                    mTitle.style.fontWeight = 'bold';
                    mTitle.style.textAlign = 'center';
                    mTitle.style.borderBottom = '1px solid #ddd';
                    mWrapper.appendChild(mTitle);

                    const mTable = sourceMonth.querySelector('.mini-table').cloneNode(true);
                    mTable.style.width = '100%';
                    mTable.style.fontSize = '11px';
                    mTable.style.padding = '5px';
                    
                    mTable.querySelectorAll('td').forEach(cell => {
                        if (cell.innerText.trim() === "") return;
                        if (cell.className.includes('cell-special')) {
                            cell.style.backgroundColor = cSpec; cell.style.color = tSpec; cell.style.border = '1px solid red';
                        } else if (cell.className.includes('cell-on')) {
                            cell.style.backgroundColor = cOn; cell.style.color = tOn;
                        } else {
                            cell.style.backgroundColor = cOff; cell.style.color = tOff;
                        }
                    });
                    mWrapper.appendChild(mTable);
                    td.appendChild(mWrapper);
                }
                tr.appendChild(td);
            }
            overviewTable.appendChild(tr);
        }
        temp.appendChild(overviewTable);

        const overlay = document.createElement('div');
        overlay.style.position = 'fixed'; overlay.style.top = '0'; overlay.style.left = '0'; overlay.style.zIndex = '-9999'; overlay.style.opacity = '0';
        overlay.appendChild(temp); document.body.appendChild(overlay);

        const opt = {
            margin: [0.3, 0.3, 0.3, 0.3],
            filename: isShort ? 'Shift_Summary.pdf' : 'Full_Year_Calendar.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        };

        html2pdf().set(opt).from(temp).save().then(() => {
            document.body.removeChild(overlay);
        });
    }

    window.onload = init;
</script>
</body>
</html>
